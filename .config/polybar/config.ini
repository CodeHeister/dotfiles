[colors]
fg       = #abb2bf
bg       = #282c3400
red      = #FF0800
yellow   = #FFC40C
green    = #52E080
muted    = #5c6370
ws-bg    = #554b5263

[bar/main]
width            = 100%
height           = 24
background       = ${colors.bg}
foreground       = ${colors.fg}
line-size        = 2
padding-left     = 0
padding-right    = 1
module-margin    = 0
font-0 = Iosevka:size=10;2
font-1 = Symbols Nerd Font:style=Regular:size=10;2
font-2 = Hack Nerd Font:style=Regular:size=10;2
modules-left     = workspaces
modules-center   = date
modules-right = spotify separator sysinfo
tray-position    = none
cursor-click     = pointer

[module/separator]
type    = custom/text
content = "  "

[module/i3]
type                     = internal/i3
pin-workspaces           = true
show-urgent              = true
index-sort               = true
enable-click             = true
enable-scroll            = true
wrapping-scroll          = false
reverse-scroll           = false
label-focused            = %name%
label-focused-padding    = 2
label-focused-background = ${colors.ws-bg}
label-focused-foreground = ${colors.green}
label-focused-underline  = ${colors.green}
label-unfocused          = %name%
label-unfocused-padding  = 2
label-urgent             = %name%
label-urgent-padding     = 2
label-urgent-background  = ${colors.red}
label-urgent-foreground  = ${colors.bg}
label-visible            = %name%
label-visible-padding    = 2
label-visible-underline  = ${colors.muted}

[module/date]
type       = internal/date
interval   = 1
date       = %a %b %d
time       = %H:%M:%S
label      =  %date%, %time%
click-left = $HOME/.config/eww/launch_eww_cal

[module/spotify]
type        = custom/script
exec        = $HOME/.config/polybar/scripts/spotify.sh
tail        = true
click-left  = playerctl play-pause
scroll-up   = playerctl next
scroll-down = playerctl previous

[module/sysinfo]
type        = custom/script
exec        = $HOME/.config/polybar/scripts/sysinfo
tail        = true

[module/workspaces]
type             = custom/script
exec             = $HOME/.config/polybar/scripts/workspaces.sh
tail             = true
click-left       = i3-msg workspace next
scroll-up        = i3-msg workspace next
scroll-down      = i3-msg workspace prev
